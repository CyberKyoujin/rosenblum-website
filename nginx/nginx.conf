upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:8080;
}

upstream frontend-admin {
    server frontend-admin:8080;
}

# Redirect HTTP → HTTPS (Cloudflare will handle the client-side TLS)
server {
    listen 80;
    server_name rosenblum-uebersetzungen.de www.rosenblum-uebersetzungen.de admin.rosenblum-uebersetzungen.de;
    return 301 https://$host$request_uri;
}

# Main site - rosenblum-uebersetzungen.de
server {
    listen 443 ssl;
    server_name rosenblum-uebersetzungen.de www.rosenblum-uebersetzungen.de;

    ssl_certificate     /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 60M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' accounts.google.com js.stripe.com; style-src 'self' fonts.googleapis.com 'unsafe-inline'; font-src 'self' fonts.gstatic.com; img-src 'self' data: lh3.googleusercontent.com storage.cloud.google.com storage.googleapis.com; frame-src 'self' www.google.com js.stripe.com; connect-src 'self' accounts.google.com api.stripe.com cdn.stripe.com o4510805923856384.ingest.de.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files from Django
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Media files from Django
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # User Frontend (React) - Default
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Admin panel - admin.rosenblum-uebersetzungen.de
server {
    listen 443 ssl;
    server_name admin.rosenblum-uebersetzungen.de;

    ssl_certificate     /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 60M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' fonts.googleapis.com 'unsafe-inline'; font-src 'self' fonts.gstatic.com; img-src 'self' data: lh3.googleusercontent.com storage.cloud.google.com storage.googleapis.com; frame-src 'none'; connect-src 'self' o4510805923856384.ingest.de.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files from Django
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Media files from Django
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Admin Frontend (React) - Default
    location / {
        proxy_pass http://frontend-admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
